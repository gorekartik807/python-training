{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>Edit Subject</h2>
    <form method="POST">
        <div class="form-group">
            <label>Subject Name *</label>
            <input type="text" name="subject_name" value="{{ subject.subject_name }}" required>
        </div>
        <div class="form-group">
            <label>Subject Code *</label>
            <input type="text" name="subject_code" value="{{ subject.subject_code }}" required>
        </div>
        <div class="form-group">
            <label>Teacher Name</label>
            <input type="text" name="teacher_name" value="{{ subject.teacher_name or '' }}">
        </div>
        <button type="submit" class="btn btn-primary">Update Subject</button>
        <a href="/subjects" class="btn btn-danger">Cancel</a>
    </form>
</div>
{% endblock %}

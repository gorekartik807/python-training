{% extends 'base.html' %}

{% block content %}
<h1>Student Records</h1>
<table border="1" cellpadding="5">
    <tr>
        <th>Roll</th>
        <th>Name</th>
        <th>Marks</th>
    </tr>
    {% for student in students %}
    <tr>
        <td>{{ student.roll }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.marks }}</td>
    </tr>
    {% endfor %}
</table>
<br>
<a href="{{ url_for('home') }}">Back to Home</a>
{% endblock %}

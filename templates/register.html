{% extends "base.html" %}
{% block content %}
<div style="max-width: 450px; margin: 50px auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 30px;">Register</h2>
        
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select name="role" class="form-control" required>
                    <option value="">Select Role</option>
                    <option value="student">Student</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 10px;">
                Register
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            Already have account? <a href="/login">Login here</a>
        </div>
    </div>
</div>
{% endblock %}

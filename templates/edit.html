{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Edit Student</h2>
    <form method="POST" style="margin-top: 20px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div><label>Name</label><input type="text" name="name" value="{{ student.name }}" required></div>
            <div><label>Roll No</label><input type="text" name="roll_no" value="{{ student.roll_no }}" required></div>
            <div><label>Email</label><input type="email" name="email" value="{{ student.email }}" required></div>
            <div><label>Phone</label><input type="text" name="phone" value="{{ student.phone }}" required></div>
            <div><label>Course</label><input type="text" name="course" value="{{ student.course }}" required></div>
            <div>
                <label>Subject</label>
                <select name="subject" required>
                    {% for sub in subjects %}
                        <option value="{{ sub.subject_name }}" {% if sub.subject_name==student.subject %}selected{% endif %}>{{ sub.subject_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div><label>Marks</label><input type="number" name="marks" value="{{ student.marks }}" min="0" max="100" required></div>
            <div><label>Attendance %</label><input type="number" name="attendance" value="{{ student.attendance }}" min="0" max="100" required></div>
        </div>
        <div style="margin-top: 25px;">
            <button type="submit" class="btn btn-warning">Update Student</button>
            <a href="/records" class="btn" style="background: #6c757d; color: white;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning">
                    <h4><i class="fas fa-user-edit"></i> Update Student</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Roll No</label>
                            <input type="text" name="roll" class="form-control" value="{{ student.roll }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <select name="subject" class="form-select" required>
                                <option value="Maths" {% if student.subject == 'Maths' %}selected{% endif %}>Maths</option>
                                <option value="Science" {% if student.subject == 'Science' %}selected{% endif %}>Science</option>
                                <option value="English" {% if student.subject == 'English' %}selected{% endif %}>English</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Marks</label>
                            <input type="number" name="marks" class="form-control" value="{{ student.marks }}" min="0" max="100" required>
                        </div>
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-save"></i> Update Student
                        </button>
                        <a href="{{ url_for('records') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
